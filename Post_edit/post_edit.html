<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 수정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="post_edit.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <button class="btn-back" onclick="history.back()">&#8249;</button>
    <h1 class="site-title">아무 말 대잔치</h1>
    <div class="header-profile">
      <img class="profile-icon" src="" alt="프로필" />
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <section class="write-section">
      <h2 class="write-title">게시글 수정</h2>

      <!-- 제목 -->
      <div class="form-group">
        <label class="form-label" for="postTitle">제목<span class="required">*</span></label>
        <input
          class="form-input"
          type="text"
          id="postTitle"
          placeholder="제목을 입력해주세요. (최대 26글자)"
          maxlength="26"
          value="제목 1"
        />
      </div>

      <!-- 내용 -->
      <div class="form-group">
        <label class="form-label" for="postContent">내용<span class="required">*</span></label>
        <textarea
          class="form-textarea"
          id="postContent"
          placeholder="내용을 입력해주세요."
        >무엇을 얘기할까요? 아무말이라면, 삶은 항상 놀라운 모험이라고 생각합니다. 우리는 매일 새로운 경험을 하고 배우며 성장합니다. 때로는 어려움과 도전이 있지만, 그것들이 우리를 더 강하고 지혜롭게 만듭니다. 또한 우리는 주변의 사람들과 연결되어 사랑과 지지를 받습니다. 그래서 우리의 삶은 소중하고 의미가 있습니다.
자연도 아름다운 이야기입니다. 우리 주변의 자연은 끝없는 아름다움과 신비로움을 담고 있습니다. 산, 바다, 숲, 하늘 등 모든 것이 우리를 놀라게 만들고 감동시킵니다. 자연은 우리의 생명과 안정을 지키며 우리에게 힘을 줄 곳입니다.
마지막으로, 지식을 향한 탐구는 항상 흥미로운 여정입니다. 우리는 끝없는 지식의 바다에서 배우고 발견할 수 있으며, 이것이 우리를 더 깊이 이해하고 세상을 더 넓게 보게 해줍니다.
그런 의미에서, 삶은 놀라움과 경이로움으로 가득 차 있습니다. 새로운 경험을 즐기고 항상 앞으로 나아가는 것이 중요하다고 생각합니다.</textarea>
        <p class="helper-text" id="contentHelper"></p>
      </div>

      <!-- 이미지 -->
      <div class="form-group">
        <label class="form-label">이미지</label>
        <div class="file-input-wrap">
          <label class="btn-file" for="postImage">파일 선택</label>
          <input type="file" id="postImage" accept="image/*" />
          <span class="file-name" id="fileName">기존 파일 명</span>
        </div>
      </div>

      <!-- 수정하기 버튼 -->
      <button class="btn-submit active" id="submitBtn">수정하기</button>

    </section>
  </main>

  
</body>
</html>
