<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 작성</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="post_write.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <button class="btn-back" onclick="history.back()">&#8249;</button>
    <h1 class="site-title">아무 말 대잔치</h1>
    <div class="header-profile">
      <img class="profile-icon" src="" alt="프로필" />
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <section class="write-section">
      <h2 class="write-title">게시글 작성</h2>

      <!-- 제목 -->
      <div class="form-group">
        <label class="form-label" for="postTitle">제목<span class="required">*</span></label>
        <input
          class="form-input"
          type="text"
          id="postTitle"
          placeholder="제목을 입력해주세요. (최대 26글자)"
          maxlength="26"
        />
      </div>

      <!-- 내용 -->
      <div class="form-group">
        <label class="form-label" for="postContent">내용<span class="required">*</span></label>
        <textarea
          class="form-textarea"
          id="postContent"
          placeholder="내용을 입력해주세요."
        ></textarea>
        <p class="helper-text" id="contentHelper"></p>
      </div>

      <!-- 이미지 -->
      <div class="form-group">
        <label class="form-label">이미지</label>
        <div class="file-input-wrap">
          <label class="btn-file" for="postImage">파일 선택</label>
          <input type="file" id="postImage" accept="image/*" />
          <span class="file-name" id="fileName">파일을 선택해주세요.</span>
        </div>
      </div>

      <!-- 등록 버튼 -->
      <button class="btn-submit" id="submitBtn" disabled>등록</button>

    </section>
  </main>

  
</body>
</html>
